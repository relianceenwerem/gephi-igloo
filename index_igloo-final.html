<script>
// Node field indices
const F={ID:0,LB:1,TY:2,NX:3,NY:4,DG:5,IN:6,OUT:7,TC:8,R:9,G:10,B:11,SZ:12};

const TYPE_COLORS={
  'Primary Author':'#d4824a',
  'Text':'#7db87d',
  'Theme':'#c47a8a',
  'Discipline':'#9b7ec4',
  'Cited Author':'#5a8ab0'
};

const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
let W,H,dpr;
let transform={x:0,y:0,scale:1};
let nodes=[],edges=[],nodeMap=new Map();
let highlighted=null,filterType='all';
let isDragging=false,dragStart={x:0,y:0},transformStart={x:0,y:0};
let hoverNode=null;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  if(nodes.length) layoutNodes();
  draw();
}

function layoutNodes(){
  // Spread nodes across the full window width with 8:1 proportions
  // Map NX across full width, compress NY into middle vertical band
  const HPAD=Math.round(W*0.015);
  const VTOP=Math.round(H*0.20);
  const VBOT=Math.round(H*0.12);
  const usableH=H-VTOP-VBOT;
  GRAPH.nodes.forEach((n,i)=>{
    nodes[i].wx=n[F.NX]*(W-HPAD*2)+HPAD;
    nodes[i].wy=n[F.NY]*usableH+VTOP;
  });
}

function worldToScreen(wx,wy){
  return{x:wx*transform.scale+transform.x,y:wy*transform.scale+transform.y};
}
function screenToWorld(sx,sy){
  return{x:(sx-transform.x)/transform.scale,y:(sy-transform.y)/transform.scale};
}

function nodeScreenPos(n){
  return worldToScreen(n.wx,n.wy);
}

function nodeRadius(n){
  const base=n[F.TY]==='Primary Author'||n[F.TY]==='Text'?12:6;
  return base+Math.sqrt(n[F.DG])*1.4;
}

function nodeColor(n,alpha=1){
  const c=TYPE_COLORS[n[F.TY]]||'#888';
  // parse hex
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function isVisible(n){
  if(filterType==='all')return true;
  return n[F.TY]===filterType;
}

function isHighlighted(n){
  if(!highlighted)return true;
  return highlighted.connected.has(n[F.ID]);
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Draw edges
  ctx.save();
  edges.forEach(e=>{
    const s=nodeMap.get(e[0]),t=nodeMap.get(e[1]);
    if(!s||!t)return;
    if(!isVisible(s)||!isVisible(t))return;
    const sp=nodeScreenPos(s),tp=nodeScreenPos(t);
    // skip if offscreen
    if(sp.x<-200&&tp.x<-200)return;
    if(sp.x>W+200&&tp.x>W+200)return;

    let alpha=0.12;
    if(highlighted){
      const connected=highlighted.connected;
      alpha=connected.has(s[F.ID])&&connected.has(t[F.ID])?0.6:0.02;
    }
    const w=Math.max(0.8,e[2]*0.35);
    ctx.beginPath();
    ctx.moveTo(sp.x,sp.y);
    ctx.lineTo(tp.x,tp.y);
    ctx.strokeStyle=`rgba(180,160,130,${alpha})`;
    ctx.lineWidth=w;
    ctx.stroke();
  });
  ctx.restore();

  // Draw nodes
  nodes.forEach(n=>{
    if(!isVisible(n))return;
    const p=nodeScreenPos(n);
    if(p.x<-50||p.x>W+50||p.y<-50||p.y>H+50)return;
    const r=nodeRadius(n)*Math.min(1,transform.scale*0.8+0.4);
    let alpha=highlighted?(isHighlighted(n)?0.95:0.07):0.85;

    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);

    // Use original Gephi color with alpha
    const isPrimary=n[F.TY]==='Primary Author'||n[F.TY]==='Text'||n[F.TY]==='Theme'||n[F.TY]==='Discipline';
    if(isPrimary){
      ctx.fillStyle=`rgba(${n[F.R]},${n[F.G]},${n[F.B]},${alpha})`;
    } else {
      ctx.fillStyle=`rgba(${n[F.R]},${n[F.G]},${n[F.B]},${alpha*0.7})`;
    }
    ctx.fill();

    if(isPrimary&&alpha>0.5){
      ctx.strokeStyle=`rgba(232,213,176,${alpha*0.5})`;
      ctx.lineWidth=0.8;
      ctx.stroke();
    }
  });

  // Labels
  ctx.save();
  nodes.forEach(n=>{
    if(!isVisible(n))return;
    const p=nodeScreenPos(n);
    if(p.x<-50||p.x>W+50||p.y<-50||p.y>H+50)return;

    const isPrimary=n[F.TY]==='Primary Author'||n[F.TY]==='Text';
    const showLabel=isPrimary||(transform.scale>1.2&&n[F.DG]>5)||(n===hoverNode);
    if(!showLabel)return;
    if(highlighted&&!isHighlighted(n))return;

    const r=nodeRadius(n)*Math.min(1,transform.scale*0.8+0.4);
    ctx.font=isPrimary?`${Math.max(16,18*Math.min(transform.scale,2))}px 'Space Mono'`:`${Math.max(13,15*Math.min(transform.scale,2))}px 'Space Mono'`;
    ctx.fillStyle=isPrimary?'rgba(232,213,176,0.9)':'rgba(180,200,220,0.7)';
    ctx.fillText(n[F.LB],p.x+r+3,p.y+3);
  });
  ctx.restore();
}

// Load data
function init(){
  // Build world coords — spread across panoramic canvas
  const HPAD=Math.round(W*0.015);
  const VTOP=Math.round(H*0.20);
  const VBOT=Math.round(H*0.12);
  const usableH=H-VTOP-VBOT;
  nodes=GRAPH.nodes.map(n=>{
    const copy=[...n];
    copy.wx=n[F.NX]*(W-HPAD*2)+HPAD;
    copy.wy=n[F.NY]*usableH+VTOP;
    return copy;
  });
  edges=GRAPH.edges;
  nodes.forEach(n=>nodeMap.set(n[F.ID],n));

  // Center transform
  transform={x:0,y:0,scale:1};

  document.getElementById('nc').textContent=nodes.length;
  document.getElementById('sub').textContent=`${nodes.length} nodes · ${edges.length} edges · Texts & Technology Reading List`;

  buildLegend();
  draw();
}

function buildLegend(){
  const leg=document.getElementById('leg');
  const types=['all',...Object.keys(TYPE_COLORS)];
  const counts={all:nodes.length};
  nodes.forEach(n=>{counts[n[F.TY]]=(counts[n[F.TY]]||0)+1});

  types.forEach(t=>{
    if(t!=='all'&&!counts[t])return;
    const btn=document.createElement('button');
    btn.className='lb'+(t==='all'?' on':'');
    btn.dataset.t=t;
    const dot=document.createElement('span');
    dot.className='dot';
    dot.style.background=t==='all'?'#666':(TYPE_COLORS[t]||'#888');
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(t==='all'?`All (${nodes.length})`:t+` (${counts[t]||0})`));
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      filterType=t;
      highlighted=null;
      const vis=t==='all'?nodes.length:(counts[t]||0);
      document.getElementById('nc').textContent=vis;
      draw();
    });
    leg.appendChild(btn);
  });
}

// Interaction
const tt=document.getElementById('tt');
function hitTest(sx,sy){
  let best=null,bestDist=Infinity;
  nodes.forEach(n=>{
    if(!isVisible(n))return;
    const p=nodeScreenPos(n);
    const r=nodeRadius(n)*Math.min(1,transform.scale*0.8+0.4)+4;
    const dx=sx-p.x,dy=sy-p.y;
    const d=dx*dx+dy*dy;
    if(d<r*r&&d<bestDist){bestDist=d;best=n;}
  });
  return best;
}

canvas.addEventListener('mousemove',e=>{
  const cx=e.clientX, cy=e.clientY;
  if(isDragging){
    transform.x=transformStart.x+(cx-dragStart.x);
    transform.y=transformStart.y+(cy-dragStart.y);
    draw();return;
  }
  const n=hitTest(cx,cy);
  hoverNode=n;
  if(n){
    canvas.style.cursor='pointer';
    tt.classList.add('show');
    tt.style.left=(cx+16)+'px';
    tt.style.top=(cy-10)+'px';
    document.getElementById('ttn').textContent=n[F.LB];
    document.getElementById('tty').textContent=n[F.TY];
    document.getElementById('tty').style.color=TYPE_COLORS[n[F.TY]]||'#888';
    document.getElementById('tti').textContent=n[F.IN];
    document.getElementById('tto').textContent=n[F.OUT];
    document.getElementById('ttd').textContent=n[F.DG];
    document.getElementById('ttc').textContent=n[F.TC];
    draw();
  } else {
    canvas.style.cursor='crosshair';
    tt.classList.remove('show');
    if(hoverNode!==n){draw();}
  }
});

canvas.addEventListener('mousedown',e=>{
  isDragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  transformStart={x:transform.x,y:transform.y};
});

canvas.addEventListener('mouseup',e=>{
  const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
  isDragging=false;
  if(Math.abs(dx)<3&&Math.abs(dy)<3){
    const n=hitTest(e.clientX,e.clientY);
    if(n){
      const connected=new Set([n[F.ID]]);
      edges.forEach(e=>{
        if(e[0]===n[F.ID])connected.add(e[1]);
        if(e[1]===n[F.ID])connected.add(e[0]);
      });
      highlighted={node:n,connected};
      document.getElementById('nc').textContent=connected.size;
    } else {
      highlighted=null;
      const vis=filterType==='all'?nodes.length:nodes.filter(n=>n[F.TY]===filterType).length;
      document.getElementById('nc').textContent=vis;
    }
    draw();
  }
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.12:0.89;
  const mx=e.clientX,my=e.clientY;
  transform.x=mx-(mx-transform.x)*factor;
  transform.y=my-(my-transform.y)*factor;
  transform.scale*=factor;
  draw();
},{passive:false});

// Touch events for Igloo WebView (touch passes through where mouse may not)
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    isDragging=true;
    dragStart={x:t.clientX,y:t.clientY};
    transformStart={x:transform.x,y:transform.y};
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    transform.x=transformStart.x+(t.clientX-dragStart.x);
    transform.y=transformStart.y+(t.clientY-dragStart.y);
    draw();
  } else if(e.touches.length===2){
    // pinch to zoom
    const t1=e.touches[0],t2=e.touches[1];
    const dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    if(!canvas._lastPinch) canvas._lastPinch=dist;
    const factor=dist/canvas._lastPinch;
    const mx=(t1.clientX+t2.clientX)/2, my=(t1.clientY+t2.clientY)/2;
    transform.x=mx-(mx-transform.x)*factor;
    transform.y=my-(my-transform.y)*factor;
    transform.scale*=factor;
    canvas._lastPinch=dist;
    draw();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  canvas._lastPinch=null;
  const dx=e.changedTouches[0].clientX-dragStart.x;
  const dy=e.changedTouches[0].clientY-dragStart.y;
  isDragging=false;
  if(Math.abs(dx)<8&&Math.abs(dy)<8){
    const t=e.changedTouches[0];
    const n=hitTest(t.clientX,t.clientY);
    if(n){
      const connected=new Set([n[F.ID]]);
      edges.forEach(e=>{
        if(e[0]===n[F.ID])connected.add(e[1]);
        if(e[1]===n[F.ID])connected.add(e[0]);
      });
      highlighted={node:n,connected};
      document.getElementById('nc').textContent=connected.size;
      tt.classList.add('show');
      tt.style.left=(t.clientX+16)+'px';
      tt.style.top=(t.clientY-10)+'px';
      document.getElementById('ttn').textContent=n[F.LB];
      document.getElementById('tty').textContent=n[F.TY];
      document.getElementById('tty').style.color=TYPE_COLORS[n[F.TY]]||'#888';
      document.getElementById('tti').textContent=n[F.IN];
      document.getElementById('tto').textContent=n[F.OUT];
      document.getElementById('ttd').textContent=n[F.DG];
      document.getElementById('ttc').textContent=n[F.TC];
    } else {
      highlighted=null;
      tt.classList.remove('show');
      const vis=filterType==='all'?nodes.length:nodes.filter(n=>n[F.TY]===filterType).length;
      document.getElementById('nc').textContent=vis;
    }
    draw();
  }
},{passive:false});

// Pointer events fallback — catches both mouse and stylus in some WebViews
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse') return; // already handled by mouse events
  isDragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  transformStart={x:transform.x,y:transform.y};
});

canvas.addEventListener('pointermove',e=>{
  if(e.pointerType==='mouse') return;
  if(!isDragging) return;
  transform.x=transformStart.x+(e.clientX-dragStart.x);
  transform.y=transformStart.y+(e.clientY-dragStart.y);
  draw();
});

canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='mouse') return;
  const dx=e.clientX-dragStart.x, dy=e.clientY-dragStart.y;
  isDragging=false;
  if(Math.abs(dx)<8&&Math.abs(dy)<8){
    const n=hitTest(e.clientX,e.clientY);
    if(n){
      const connected=new Set([n[F.ID]]);
      edges.forEach(ev=>{
        if(ev[0]===n[F.ID])connected.add(ev[1]);
        if(ev[1]===n[F.ID])connected.add(ev[0]);
      });
      highlighted={node:n,connected};
      document.getElementById('nc').textContent=connected.size;
    } else {
      highlighted=null;
      const vis=filterType==='all'?nodes.length:nodes.filter(n=>n[F.TY]===filterType).length;
      document.getElementById('nc').textContent=vis;
    }
    draw();
  }
});

window.addEventListener('resize',resize);
resize();
init();
</script>
</body>
</html>
